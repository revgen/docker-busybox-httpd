<!doctype html>
<html lang=en>
<head>
    <title>${TITLE}</title>
    <meta charset=utf-8>
    <meta name=viewport content="width=device-width,initial-scale=1">
    <meta name=color-scheme content="light dark">
    <style>
        body { font-size: 1.4em; line-height: 0.8em; font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif}
        .wrapper { display: flex; flex-direction: column; min-height: 96vh; width: 100%; }
        .content { margin-top: 0; margin-bottom: 0; flex: 1; display: flex; }
        .centered { margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        .banner { text-align: center; }
        h1 { font-size: 3.6rem; }
        h2 { font-size: 2.2rem; }
        @media screen and (max-width:1150px) { .wrapper { min-height: 85vh; } }
    </style>
</head>
<body>
    <main class="wrapper">
        <div class="content">
            <section class="centered">
                <div class="banner" >
                    <h1>500</h1>
                    <h2>Internal Server Error</h2>
                    <p>Go back to the <a href="${HOMEPAGE}" title="homepage">homepage</a></p>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
